<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Dashboard – Car Parking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c18;
            --card: rgba(255, 255, 255, .055);
            --border: rgba(255, 255, 255, .1);
            --primary: #06b6d4;
            --accent: #7c3aed;
            --muted: #64748b;
            --light: #94a3b8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #060d1a 0%, #061a1d 60%, #0d0820 100%);
            color: var(--text);
        }

        .topbar {
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, .35);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tb-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #06b6d4, #7c3aed);
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 800;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
        }

        .owner-role {
            font-size: 11px;
            background: rgba(6, 182, 212, .2);
            color: #67e8f9;
            padding: 2px 10px;
            border-radius: 999px;
            display: inline-block;
            margin-top: 2px;
        }

        #logout-btn {
            padding: 9px 18px;
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #fca5a5;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .2s;
        }

        #logout-btn:hover {
            background: rgba(239, 68, 68, .28);
        }

        .content {
            padding: 36px 32px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero {
            background: linear-gradient(135deg, rgba(6, 182, 212, .15), rgba(124, 58, 237, .15));
            border: 1px solid rgba(6, 182, 212, .25);
            border-radius: 20px;
            padding: 32px 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '🏢';
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 72px;
            opacity: .12;
        }

        .hero h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .hero p {
            color: var(--light);
            font-size: 14.5px;
            line-height: 1.6;
        }

        .hero .id-tag {
            display: inline-block;
            margin-top: 12px;
            background: rgba(6, 182, 212, .2);
            border: 1px solid rgba(6, 182, 212, .35);
            color: #67e8f9;
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .info-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 20px;
            transition: transform .2s, box-shadow .2s;
        }

        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, .3);
        }

        .ic-label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: .4px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .ic-value {
            font-size: 18px;
            font-weight: 700;
        }

        .profile-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
        }

        .profile-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .profile-field label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-bottom: 5px;
        }

        .profile-field .val {
            font-size: 14.5px;
            font-weight: 500;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
        }

        @media(max-width:600px) {
            .content {
                padding: 24px 16px;
            }

            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="topbar-brand">
            <div class="tb-icon">🅿️</div>
            <div class="topbar-title">Car Parking System</div>
        </div>
        <div class="user-info">
            <div class="user-avatar" id="owner-avatar">O</div>
            <div>
                <div style="font-size:13.5px;font-weight:600;" id="owner-name">Owner</div>
                <div class="owner-role">Parking Owner</div>
            </div>
            <button id="logout-btn" onclick="doLogout()">🚪 Logout</button>
        </div>
    </header>

    <div class="content">
        <div class="hero">
            <h2>Welcome, <span id="hero-name">Owner</span>! 🏢</h2>
            <p>Manage your parking lot from this dashboard. Monitor slot availability and operations easily.</p>
            <div class="id-tag">🪪 Owner ID: <strong id="hero-ownerid">—</strong></div>
        </div>

        <div class="cards-grid">
            <div class="info-card">
                <div class="ic-label">Parking Lot</div>
                <div class="ic-value" id="ic-lot" style="font-size:15px;">—</div>
            </div>
            <div class="info-card">
                <div class="ic-label">Location</div>
                <div class="ic-value" id="ic-location" style="font-size:15px;">—</div>
            </div>
            <div class="info-card">
                <div class="ic-label">Total Slots</div>
                <div class="ic-value" id="ic-slots" style="color:#06b6d4;">—</div>
            </div>
            <div class="info-card">
                <div class="ic-label">Account Status</div>
                <div class="ic-value" id="ic-status" style="color:#4ade80;">● Active</div>
            </div>
        </div>

        <div class="profile-section">
            <h3>🏢 Owner Profile</h3>
            <div class="profile-grid">
                <div class="profile-field"><label>Full Name</label>
                    <div class="val" id="pf-name">—</div>
                </div>
                <div class="profile-field"><label>Owner ID (Login ID)</label>
                    <div class="val" id="pf-owner-id">—</div>
                </div>
                <div class="profile-field"><label>Username</label>
                    <div class="val" id="pf-username">—</div>
                </div>
                <div class="profile-field"><label>Email Address</label>
                    <div class="val" id="pf-email">—</div>
                </div>
                <div class="profile-field"><label>Parking Lot Name</label>
                    <div class="val" id="pf-lot">—</div>
                </div>
                <div class="profile-field"><label>Location</label>
                    <div class="val" id="pf-location">—</div>
                </div>
                <div class="profile-field"><label>Total Slots</label>
                    <div class="val" id="pf-slots">—</div>
                </div>
                <div class="profile-field"><label>Status</label>
                    <div class="val" id="pf-status">—</div>
                </div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        const session = requireLogin(['parking_owner']);
        if (session) {
            const o = session;
            const initial = (o.full_name || o.username || 'O')[0].toUpperCase();
            document.getElementById('owner-avatar').textContent = initial;
            document.getElementById('owner-name').textContent = o.full_name || o.username;
            document.getElementById('hero-name').textContent = (o.full_name || o.username).split(' ')[0];
            document.getElementById('hero-ownerid').textContent = o.owner_id;
            document.getElementById('ic-lot').textContent = o.lot_name || '—';
            document.getElementById('ic-location').textContent = o.location || '—';
            document.getElementById('ic-slots').textContent = o.total_slots ?? '—';
            document.getElementById('pf-name').textContent = o.full_name || '—';
            document.getElementById('pf-owner-id').textContent = o.owner_id || '—';
            document.getElementById('pf-username').textContent = o.username || '—';
            document.getElementById('pf-email').textContent = o.email || '—';
            document.getElementById('pf-lot').textContent = o.lot_name || '—';
            document.getElementById('pf-location').textContent = o.location || '—';
            document.getElementById('pf-slots').textContent = o.total_slots ?? '—';
            const st = document.getElementById('pf-status');
            st.textContent = o.status || 'active';
            st.style.color = o.status === 'active' ? '#4ade80' : '#f87171';
        }
        function doLogout() {
            clearSession();
            window.location.href = 'Login page.html';
        }
    </script>
</body>

</html>
